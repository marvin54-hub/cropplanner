<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – CropPlanner</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="/index.html" class="logo"><span class="logo-icon">🌾</span> CropPlanner</a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/login.html">Login</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><span class="auth-logo-icon">🌱</span></div>
        <h2>Join CropPlanner</h2>
        <p>Create your account and start planning your crops today.</p>

        <form id="registerForm" autocomplete="on">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" class="form-control"
                       required placeholder="John Farmer" maxlength="100" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" class="form-control"
                       required placeholder="farmer@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-control"
                       placeholder="+27 71 234 5678" maxlength="20">
            </div>
            <div class="form-group">
                <label for="location">Location / Farm Area</label>
                <input type="text" id="location" class="form-control"
                       placeholder="Limpopo, South Africa" maxlength="100">
            </div>
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" class="form-control"
                       required placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create My Account</button>
        </form>

        <p class="mt-2 text-center" style="color:var(--text-muted);font-size:0.9rem">
            Already have an account?
            <a href="/login.html" style="color:var(--primary);font-weight:600">Login here</a>
        </p>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
