<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CropPlanner</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="/index.html" class="logo"><span class="logo-icon">🌾</span> CropPlanner</a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/register.html">Register</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo"><span class="auth-logo-icon">👨‍🌾</span></div>
        <h2>Welcome Back!</h2>
        <p>Login to access your farming dashboard.</p>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control"
                       required placeholder="farmer@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control"
                       required placeholder="Your password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login to Dashboard</button>
        </form>

        <p class="mt-2 text-center" style="color:var(--text-muted);font-size:0.9rem">
            Don't have an account?
            <a href="/register.html" style="color:var(--primary);font-weight:600">Register here</a>
        </p>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
