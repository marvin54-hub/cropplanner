# ── Server ────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── Database — UPDATE YOUR PASSWORD BELOW ────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/crop_planner_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourPasswordHere
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Static resources ──────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── Session ───────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.cropplanner=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── JWT ───────────────────────────────────────────────────────────
# IMPORTANT: Replace this with a strong random secret before deploying.
# Generate one with: openssl rand -base64 48
# Must be at least 32 characters for HMAC-SHA256.
jwt.secret=change-me-in-production-use-openssl-rand-base64-48
jwt.expiry-ms=3600000

# ── Cache ─────────────────────────────────────────────────────────
# Using Spring's default ConcurrentMapCacheManager (in-process, no Redis needed).
# Replace with spring-boot-starter-data-redis + spring.cache.type=redis for
# multi-instance deployments where cache coherence across nodes is needed.
spring.cache.type=simple

# ── Weather (Open-Meteo) ──────────────────────────────────────────
# No API key needed — Open-Meteo is a free, no-registration weather API.
# These URLs are defaults used by OpenMeteoClient; override here if needed.
weather.openmeteo.forecast-url=https://api.open-meteo.com/v1/forecast
weather.openmeteo.geocoding-url=https://geocoding-api.open-meteo.com/v1/search
